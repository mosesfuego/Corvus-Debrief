#mes_type: "csv"
mes_type: "csv"

agents:
  provider: "nvidia_nim"
  model: "moonshotai/kimi-k2.6"
  api_key: ${NIM_API_KEY}
  base_url: "https://integrate.api.nvidia.com/v1"

llm_providers:
  - name: "nvidia_nim"
    rank: 1
    model: "moonshotai/kimi-k2.6"
    api_key: ${NIM_API_KEY}
    base_url: "https://integrate.api.nvidia.com/v1"
    extra_body:
      chat_template_kwargs:
        thinking: false
  - name: "google_gemini"
    rank: 2
    model: "gemini-2.5-flash"
    api_key: ${GEMINI_API_KEY}
    base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
  - name: "moonshot_kimi"
    rank: 3
    model: "kimi-k2.6"
    api_key: ${MOONSHOT_API_KEY}
    base_url: "https://api.moonshot.ai/v1"

domain_agents:
  enabled:
    - work_order
    - materials
    - quality
    - schedule
    - labor

reporting:
  output_dir: "./reports"
  format: "console"
