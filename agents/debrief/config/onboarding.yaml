schema_version: '1.0'
company: Acme Manufacturing
site: Plant A
teams:
- name: Quality Assurance
  cares_about:
  - blocked builds
  - inspection backlog
  - yield issues
  - QA clearance
  meeting: "Daily Quality Standup \u2014 8:00am"
- name: Production
  cares_about:
  - on-time delivery
  - bottlenecks
  - overtime decisions
  - partial shipment
  meeting: "Morning Production Review \u2014 7:30am"
- name: Scheduling
  cares_about:
  - staffing gaps
  - shift coverage
  - unassigned operator
  - at-risk orders
  meeting: "Weekly Planning \u2014 Monday 9:00am"
csv_connector:
  file_path: shared/data/snack_factory_batch_log.csv
  mapping_fingerprint: 744fc1b51c67
  column_map:
    build_id: Batch_No
    station_id: Production_Line
    operator_id: Crew_Lead
    planned_end: Planned_Finish
    needed_by_date: Ship_By
    target_quantity: Planned_Units
    completed_quantity: Good_Units
    labor_hours: Labor_Hrs
    status: Run_State
    notes: Remarks
    start_time: Event_Time
  status_map:
    Running: In Progress
    Stopped: Blocked
